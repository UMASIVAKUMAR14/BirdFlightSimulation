<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bird Flight Simulation</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
        {
            "imports": {
              "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
              "three/": "https://unpkg.com/three@0.160.0/"
            }
        }
    </script>
</head>
<body>
<script type="module">
    import {ThreeEngine, get_default_lil_gui, refresh_displays} from "./js/utils/utils_three.js";
    import {Birdbot, get_xyz_rpy_SE3_matrix} from "./js/utils/utils_robot.js";
    import {mul_matrix_matrix, identity_matrix, transpose, matrix_inverse_3x3} from "./js/utils/utils_math.js";

    let engine = ThreeEngine.new_default_3d();

    let robot = new Birdbot();
    robot.spawn_robot(engine);

    let links = robot.get_robot_links();
    let joints = robot.get_robot_joints();

    let settings = {
        t: 0.0,
        playback_speed: 1.0,
        play: true,
        p1_x: 0.0,
        p1_y: 0.0,
        p1_z: 0.0,
        p2_x: 0.0,
        p2_y: 0.0,
        p2_z: 0.0,
        p3_x: 0.0,
        p3_y: 0.0,
        p3_z: 0.0,
    }

    let joint_settings = {};
    for (let joint of joints) {
        for (let dof_idx = 0; dof_idx < joint.get_joint_num_dofs(); dof_idx++) {
            joint_settings[`${joint.joint_idx}_${dof_idx}`] = 0.0;
        }
    }

    let actions = {
        play: function() {
            settings.play = true;
            refresh_displays();
        },
        pause: function() {
            settings.play = false;
            refresh_displays();
        },
    }

    let gui = get_default_lil_gui();
    gui.add(settings, 't', 0.0, 1.0);
    gui.add(settings, 'playback_speed', 0.1, 5.0);
    gui.add(actions, 'play');
    gui.add(actions, 'pause');

    let controlpoint_folder = gui.addFolder('Control Points');
    controlpoint_folder.add(settings, 'p1_x', -10.0, 10.0).name('P1 X');
    controlpoint_folder.add(settings, 'p1_y', -10.0, 10.0).name('P1 Y');
    controlpoint_folder.add(settings, 'p1_z', -10.0, 10.0).name('P1 Z');

    controlpoint_folder.add(settings, 'p2_x', -10.0, 10.0).name('P2 X');
    controlpoint_folder.add(settings, 'p2_y', -10.0, 10.0).name('P2 Y');
    controlpoint_folder.add(settings, 'p2_z', -10.0, 10.0).name('P2 Z');

    controlpoint_folder.add(settings, 'p3_x', -10.0, 10.0).name('P3 X');
    controlpoint_folder.add(settings, 'p3_y', -10.0, 10.0).name('P3 Y');
    controlpoint_folder.add(settings, 'p3_z', -10.0, 10.0).name('P3 Z');


    // HELPERS
    function so3_exp(u) {
        let a = u[0], b = u[1], c = u[2];

        let A = [
            [0, -c, b],
            [c, 0, -a],
            [-b, a, 0]
        ];

        let A2 = mul_matrix_matrix(A, A);

        let beta = Math.sqrt(a*a + b*b + c*c);

        let p, q;

        if (beta < 0.0001) {
            p = 1.0 - (beta*beta)/6.0 + (beta**4)/120.0;
            q = 0.5 - (beta*beta)/24.0 + (beta**4)/720.0;
        } else {
            p = Math.sin(beta) / beta;
            q = (1.0 - Math.cos(beta)) / (beta * beta);
        }

        // R = I + pA + qA^2
        return [
            [1 + p*A[0][0] + q*A2[0][0],     p*A[0][1] + q*A2[0][1],     p*A[0][2] + q*A2[0][2]],
            [    p*A[1][0] + q*A2[1][0], 1 + p*A[1][1] + q*A2[1][1],     p*A[1][2] + q*A2[1][2]],
            [    p*A[2][0] + q*A2[2][0],     p*A[2][1] + q*A2[2][1], 1 + p*A[2][2] + q*A2[2][2]]
        ];
    }

    function so3_log(R_d) {
        let trace_R = R_d[0][0] + R_d[1][1] + R_d[2][2];
        let cos_beta = (trace_R - 1.0) / 2.0;
        cos_beta = Math.max(-1.0, Math.min(1.0, cos_beta));
        let beta = Math.acos(cos_beta);

        let A;
        if (Math.abs(beta) < 0.0001) {
            let s = 0.5 + (beta * beta) / 12.0 + 7.0 * (beta ** 4) / 720.0;
            A = [
                [0, s * (R_d[0][1] - R_d[1][0]), s * (R_d[0][2] - R_d[2][0])],
                [s * (R_d[1][0] - R_d[0][1]), 0, s * (R_d[1][2] - R_d[2][1])],
                [s * (R_d[2][0] - R_d[0][2]), s * (R_d[2][1] - R_d[1][2]), 0]
            ];
        } else if (Math.abs(beta) == Math.PI) {
            let a1 = Math.PI * Math.sqrt(Math.max(0, 0.5 * (R_d[0][0] + 1.0)));
            let a2 = Math.PI * Math.sqrt(Math.max(0, 0.5 * (R_d[1][1] + 1.0)));
            let a3 = Math.PI * Math.sqrt(Math.max(0, 0.5 * (R_d[2][2] + 1.0)));

            A = [
                [0, -a3, a2],
                [a3, 0, -a1],
                [-a2, a1, 0]
            ];
        } else {
            let s = beta / (2.0 * Math.sin(beta));
            A = [
                [0, s * (R_d[0][1] - R_d[1][0]), s * (R_d[0][2] - R_d[2][0])],
                [s * (R_d[1][0] - R_d[0][1]), 0, s * (R_d[1][2] - R_d[2][1])],
                [s * (R_d[2][0] - R_d[0][2]), s * (R_d[2][1] - R_d[1][2]), 0]
            ];
        }

        return A;
    }

    function se3_exp(w) {
        let u = [w[0], w[1], w[2]];
        let v = [w[3], w[4], w[5]];

        let R = so3_exp(u);

        let A = [
            [0, -u[2], u[1]],
            [u[2], 0, -u[0]],
            [-u[1], u[0], 0]
        ];

        let A2 = mul_matrix_matrix(A, A);

        let beta = Math.sqrt(u[0]*u[0] + u[1]*u[1] + u[2]*u[2]);

        let p, q;
        if (Math.abs(beta) < 0.0001) {
            p = 0.5 - (beta * beta) / 24.0 + (beta ** 4) / 720.0;
            q = 1.0 / 6.0 - (beta * beta) / 120.0 + (beta ** 4) / 5040.0;
        } else {
            p = (1.0 - Math.cos(beta)) / (beta * beta);
            q = (beta - Math.sin(beta)) / (beta * beta * beta);
        }

        let C = [
            [1 + p*A[0][0] + q*A2[0][0],     p*A[0][1] + q*A2[0][1],     p*A[0][2] + q*A2[0][2]],
            [    p*A[1][0] + q*A2[1][0], 1 + p*A[1][1] + q*A2[1][1],     p*A[1][2] + q*A2[1][2]],
            [    p*A[2][0] + q*A2[2][0],     p*A[2][1] + q*A2[2][1], 1 + p*A[2][2] + q*A2[2][2]]
        ];

        let t = [
            C[0][0]*v[0] + C[0][1]*v[1] + C[0][2]*v[2],
            C[1][0]*v[0] + C[1][1]*v[1] + C[1][2]*v[2],
            C[2][0]*v[0] + C[2][1]*v[1] + C[2][2]*v[2]
        ];

        return [
            [R[0][0], R[0][1], R[0][2], t[0]],
            [R[1][0], R[1][1], R[1][2], t[1]],
            [R[2][0], R[2][1], R[2][2], t[2]],
            [0, 0, 0, 1]
        ];
    }

    function se3_log(m) {
        let R_d = [
            [m[0][0], m[0][1], m[0][2]],
            [m[1][0], m[1][1], m[1][2]],
            [m[2][0], m[2][1], m[2][2]]
        ];
        let m_transpose = transpose(m);
        let A = so3_log(R_d);

        let u = [A[2][1], A[0][2], A[1][0]];
        let beta = Math.sqrt(u[0] * u[0] + u[1] * u[1] + u[2] * u[2]);

        let p, q;
        if (Math.abs(beta) < 0.0001) {
            p = 0.5 - (beta * beta) / 24.0 + (beta ** 4) / 720.0;
            q = 1.0 / 6.0 - (beta * beta) / 120.0 + (beta ** 4) / 5040.0;
        } else {
            p = (1.0 - Math.cos(beta)) / (beta * beta);
            q = (beta - Math.sin(beta)) / (beta * beta * beta);
        }

        let A2 = mul_matrix_matrix(A, A);

        let C = [
            [1 + p * A[0][0] + q * A2[0][0],     p * A[0][1] + q * A2[0][1],     p * A[0][2] + q * A2[0][2]],
            [    p * A[1][0] + q * A2[1][0], 1 + p * A[1][1] + q * A2[1][1],     p * A[1][2] + q * A2[1][2]],
            [    p * A[2][0] + q * A2[2][0],     p * A[2][1] + q * A2[2][1], 1 + p * A[2][2] + q * A2[2][2]]
        ];
        let C_inv = matrix_inverse_3x3(C);

        let t_diff = [m[0][3], m[1][3], m[2][3]];
        let t_d = [
            m_transpose[0][0] * t_diff[0] + m_transpose[0][1] * t_diff[1] + m_transpose[0][2] * t_diff[2],
            m_transpose[1][0] * t_diff[0] + m_transpose[1][1] * t_diff[1] + m_transpose[1][2] * t_diff[2],
            m_transpose[2][0] * t_diff[0] + m_transpose[2][1] * t_diff[1] + m_transpose[2][2] * t_diff[2]
        ];

        let b = [
                C_inv[0][0] * t_d[0] + C_inv[0][1] * t_d[1] + C_inv[0][2] * t_d[2],
                C_inv[1][0] * t_d[0] + C_inv[1][1] * t_d[1] + C_inv[1][2] * t_d[2],
                C_inv[2][0] * t_d[0] + C_inv[2][1] * t_d[1] + C_inv[2][2] * t_d[2]
                ];
        return u.concat(b);
    }



    function to_vec3(v) {
        if (!Array.isArray(v)) {
            return [0, 0, 0];
        }
        if (Array.isArray(v[0])) {
            return [v[0][0], v[1][0], v[2][0]];
        }
        return [v[0], v[1], v[2]];
    }

    
    function axis_angle_to_so3(axis, angle) {
        let v = to_vec3(axis);
        let n = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
        if (n < 1e-12) { 
            return identity_matrix(3);
        }

        let x = v[0] / n;
        let y = v[1] / n;
        let z = v[2] / n;
        let c = Math.cos(angle);
        let s = Math.sin(angle);
        let one_minus_c = 1.0 - c;

        return [
            [c + x * x * one_minus_c, x * y * one_minus_c - z * s, x * z * one_minus_c + y * s],
            [y * x * one_minus_c + z * s, c + y * y * one_minus_c, y * z * one_minus_c - x * s],
            [z * x * one_minus_c - y * s, z * y * one_minus_c + x * s, c + z * z * one_minus_c]
        ];
    }

    function get_joint_motion(joint, input) {
        if (joint.joint_type_string === 'revolute') {
            let r = axis_angle_to_so3(joint.axis, input);
            return [
            [r[0][0], r[0][1], r[0][2], 0],
            [r[1][0], r[1][1], r[1][2], 0],
            [r[2][0], r[2][1], r[2][2], 0],
            [0, 0, 0, 1]];
        }

        if (joint.joint_type_string === 'prismatic') {
            let a = to_vec3(joint.axis);
            return [
            [1, 0, 0, a[0] * input],
            [0, 1, 0, a[1] * input],
            [0, 0, 1, a[2] * input],
            [0, 0, 0, 1]];
        }

        return identity_matrix(4);
    }




    engine.animation_loop( ()  => {

        engine.draw_debug_sphere([settings.p1_x, settings.p1_y, settings.p1_z], 0.1, 0x00ffff);
        engine.draw_debug_sphere([settings.p2_x, settings.p2_y, settings.p2_z], 0.1, 0xff00ff);
        engine.draw_debug_sphere([settings.p3_x, settings.p3_y, settings.p3_z], 0.1, 0xffff00);

        let kinematic_hierarchy = robot.get_robot_kinematic_hierarchy(); 

        let link_poses = {};
        for (let layer of kinematic_hierarchy) {
            for (let link_idx of layer) {
                let link = links[link_idx];

                if (link.parent_joint_idx === null) {
                    link_poses[link_idx] = identity_matrix(4);
                } else {
                    let parent_pose = link_poses[link.parent_link_idx] || identity_matrix(4);
                    let parent_joint = joints[link.parent_joint_idx];

                    if (parent_joint.joint_type_string === 'floating') {
                        let input = [
                            joint_settings[`${parent_joint.joint_idx}_0`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_1`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_2`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_3`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_4`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_5`] || 0.0,
                        ];
                        let rpy = [input[0], input[1], input[2]];
                        let xyz = [input[3], input[4], input[5]];

                        let joint_origin = get_xyz_rpy_SE3_matrix(parent_joint.xyz, parent_joint.rpy);
                        let joint_motion = get_xyz_rpy_SE3_matrix(xyz, rpy);
                        link_poses[link_idx] = mul_matrix_matrix(parent_pose, mul_matrix_matrix(joint_origin, joint_motion));
                    }
                    else {
                        let input = joint_settings[`${parent_joint.joint_idx}_0`] || 0.0;

                        let joint_origin = get_xyz_rpy_SE3_matrix(parent_joint.xyz, parent_joint.rpy);
                        let joint_motion = get_joint_motion(parent_joint, input);
                        link_poses[link_idx] = mul_matrix_matrix(parent_pose, mul_matrix_matrix(joint_origin, joint_motion));
                    }
                }

                robot.set_link_mesh_pose_from_SE3_matrix(engine, link_idx, link_poses[link_idx]);
            }
        }

        if (settings.play) {
            settings.t += engine.get_delta_time_from_last_frame() * settings.playback_speed;
        }

        joint_settings[`${joints[0].joint_idx}_4`] = Math.sin(settings.t);
        joint_settings[`${joints[0].joint_idx}_5`] = -0.5 * Math.cos(settings.t);
    });

</script>
</body>
