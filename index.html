<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bird Flight Simulation</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
        {
            "imports": {
              "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
              "three/": "https://unpkg.com/three@0.160.0/"
            }
        }
    </script>
</head>
<body>
<script type="module">
    import * as THREE from "three";
    import {ThreeEngine, get_default_lil_gui, refresh_displays} from "./js/utils/utils_three.js";
    import {Birdbot, FlappingBirdbot, DynamicBirdbot, get_xyz_rpy_SE3_matrix} from "./js/utils/utils_robot.js";
    import {add_matrix_matrix, sub_matrix_matrix, mul_matrix_matrix, mul_matrix_scalar, identity_matrix, transpose, frobenius_norm_matrix, matrix_inverse_3x3} from "./js/utils/utils_math.js";

    let engine = ThreeEngine.new_default_3d();

    let robot = new FlappingBirdbot();
    robot.spawn_robot(engine);

    let links = robot.get_robot_links();
    let joints = robot.get_robot_joints();

    let settings = {
        t: 0.0,
        playback_speed: 0.1,
        play: true,
        corner_roundness: 1.0,
        flapping_speed: 2.0,
        p1_x: -5.0, 
        p1_y: 0.0,
        p1_z: 0.0,
        p2_x: 0.0,
        p2_y: -5.0, 
        p2_z: 0.0,
        p3_x: 0.0,
        p3_y: 0.0,
        p3_z: 3.0, 
        p4_x: 5.0, 
        p4_y: 0.0,
        p4_z: 0.0,
        spline: false
    }

    let joint_settings = {};
    for (let joint of joints) {
        for (let dof_idx = 0; dof_idx < joint.get_joint_num_dofs(); dof_idx++) {
            joint_settings[`${joint.joint_idx}_${dof_idx}`] = 0.0;
        }
    }

    let actions = {
        play: function() {
            settings.play = true;
            refresh_displays();
        },
        pause: function() {
            settings.play = false;
            refresh_displays();
        },
    }

    let gui = get_default_lil_gui();
    gui.add(settings, 't', 0.0, 1.0).listen();
    gui.add(settings, 'playback_speed', 0.01, 0.5);
    gui.add(settings, 'corner_roundness', 0.01, 1.5);
    gui.add(actions, 'play');
    gui.add(actions, 'pause');
    gui.add(settings, 'flapping_speed', 0.1, 5.0);
    gui.add(settings, 'spline').name('show spline');

    let controlpoint_folder = gui.addFolder('Control Points');
    controlpoint_folder.add(settings, 'p1_x', -10.0, 10.0).name('P1 X');
    controlpoint_folder.add(settings, 'p1_y', -10.0, 10.0).name('P1 Y');
    controlpoint_folder.add(settings, 'p1_z', -10.0, 10.0).name('P1 Z');

    controlpoint_folder.add(settings, 'p2_x', -10.0, 10.0).name('P2 X');
    controlpoint_folder.add(settings, 'p2_y', -10.0, 10.0).name('P2 Y');
    controlpoint_folder.add(settings, 'p2_z', -10.0, 10.0).name('P2 Z');

    controlpoint_folder.add(settings, 'p3_x', -10.0, 10.0).name('P3 X');
    controlpoint_folder.add(settings, 'p3_y', -10.0, 10.0).name('P3 Y');
    controlpoint_folder.add(settings, 'p3_z', -10.0, 10.0).name('P3 Z');

    controlpoint_folder.add(settings, 'p4_x', -10.0, 10.0).name('P4 X');
    controlpoint_folder.add(settings, 'p4_y', -10.0, 10.0).name('P4 Y');
    controlpoint_folder.add(settings, 'p4_z', -10.0, 10.0).name('P4 Z');


    // HELPERS


    // forward kinematics helpers
    function to_vec3(v) {
        if (!Array.isArray(v)) {
            return [0, 0, 0];
        }
        if (Array.isArray(v[0])) {
            return [v[0][0], v[1][0], v[2][0]];
        }
        return [v[0], v[1], v[2]];
    }

    
    function axis_angle_to_so3(axis, angle) {
        let v = to_vec3(axis);
        let n = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
        if (n < 1e-12) { 
            return identity_matrix(3);
        }

        let x = v[0] / n;
        let y = v[1] / n;
        let z = v[2] / n;
        let c = Math.cos(angle);
        let s = Math.sin(angle);
        let one_minus_c = 1.0 - c;
        // source: https://en.wikipedia.org/wiki/Rotation_matrix#Rotation_matrix_from_axis_and_angle   

        return [
            [c + x * x * one_minus_c, x * y * one_minus_c - z * s, x * z * one_minus_c + y * s],
            [y * x * one_minus_c + z * s, c + y * y * one_minus_c, y * z * one_minus_c - x * s],
            [z * x * one_minus_c - y * s, z * y * one_minus_c + x * s, c + z * z * one_minus_c]
        ];
    }

    function get_joint_motion(joint, input) {
        if (joint.joint_type_string === 'revolute') {
            let r = axis_angle_to_so3(joint.axis, input);
            return [
            [r[0][0], r[0][1], r[0][2], 0],
            [r[1][0], r[1][1], r[1][2], 0],
            [r[2][0], r[2][1], r[2][2], 0],
            [0, 0, 0, 1]];
        }

        if (joint.joint_type_string === 'prismatic') {
            let a = to_vec3(joint.axis);
            return [
            [1, 0, 0, a[0] * input],
            [0, 1, 0, a[1] * input],
            [0, 0, 1, a[2] * input],
            [0, 0, 0, 1]];
        }

        return identity_matrix(4);
    }

    // interpolation helpers
    function get_control_point_positions() {
        return [
            [settings.p1_x, settings.p1_y, settings.p1_z],
            [settings.p2_x, settings.p2_y, settings.p2_z],
            [settings.p3_x, settings.p3_y, settings.p3_z],
            [settings.p4_x, settings.p4_y, settings.p4_z]
        ];
    }

    function tangent_to_rpy(tangent) {
        let tx = tangent[0];
        let ty = tangent[1];
        let tz = tangent[2];
        let planar = Math.sqrt(tx * tx + ty * ty);
        let n = Math.sqrt(tx * tx + ty * ty + tz * tz);

        if (n < 1e-9) {
            return [0, 0, 0];
        }

        let yaw = Math.atan2(ty, tx);
        let pitch = Math.atan2(-tz, Math.max(planar, 1e-9));
        return [0, pitch, yaw];
    }

    function build_catmull_rom_curve() {
        let points = get_control_point_positions().map(p => new THREE.Vector3(p[0], p[1], p[2]));
        let tension = Math.min(1.0, Math.max(0.0, settings.corner_roundness));
        return new THREE.CatmullRomCurve3(points, true, 'catmullrom', tension);
    }

    function evaluate_cubic_spline(t, curve) {
        let p = curve.getPoint(t);
        let tv = curve.getTangent(t);
        let tangent = [tv.x, tv.y, tv.z];

        if (frobenius_norm_matrix(tangent) < 1e-9) {
            let diffStep = 1e-3;
            let p0 = curve.getPoint(((t - diffStep) % 1.0 + 1.0) % 1.0);
            let p1 = curve.getPoint((t + diffStep) % 1.0);
            tangent = [p1.x - p0.x, p1.y - p0.y, p1.z - p0.z];
        }

        let position = [p.x, p.y, p.z];
        return { position, tangent };
    }

    function draw_spline_curve(curve, samples = 120) {
        for (let i = 0; i < samples; i++) {
            let t0 = i / samples;
            let t1 = (i + 1) / samples;
            let p0 = evaluate_cubic_spline(t0, curve).position;
            let p1 = evaluate_cubic_spline(t1, curve).position;
            engine.draw_debug_line([p0[0], p0[1], p0[2]], [p1[0], p1[1], p1[2]]);
        }
        
    }

    let flap_phase = 0.0;
    let last_flap_time = performance.now();



    engine.animation_loop( ()  => {
        let now = performance.now();
        let dt = Math.max(0.0, (now - last_flap_time) / 1000.0);
        last_flap_time = now;
        flap_phase += dt * 2.0 * Math.PI * settings.flapping_speed;

        let curve = build_catmull_rom_curve();

        if (settings.spline) {
            for (let i = 0; i < 4; i++) {
                engine.draw_debug_sphere([settings[`p${i+1}_x`], settings[`p${i+1}_y`], settings[`p${i+1}_z`]], 0.1, 0xff00ff);
            }
            draw_spline_curve(curve, 120);
        }

        let kinematic_hierarchy = robot.get_robot_kinematic_hierarchy(); 

        let link_poses = {};
        for (let layer of kinematic_hierarchy) {
            for (let link_idx of layer) {
                let link = links[link_idx];

                if (link.parent_joint_idx === null) {
                    link_poses[link_idx] = identity_matrix(4);
                } else {
                    let parent_pose = link_poses[link.parent_link_idx] || identity_matrix(4);
                    let parent_joint = joints[link.parent_joint_idx];

                    if (parent_joint.joint_type_string === 'floating') {
                        let input = [
                            joint_settings[`${parent_joint.joint_idx}_0`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_1`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_2`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_3`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_4`] || 0.0,
                            joint_settings[`${parent_joint.joint_idx}_5`] || 0.0,
                        ];
                        let rpy = [input[0], input[1], input[2]];
                        let xyz = [input[3], input[4], input[5]];

                        let joint_origin = get_xyz_rpy_SE3_matrix(parent_joint.xyz, parent_joint.rpy);
                        let joint_motion = get_xyz_rpy_SE3_matrix(xyz, rpy);
                        link_poses[link_idx] = mul_matrix_matrix(parent_pose, mul_matrix_matrix(joint_origin, joint_motion));
                    }
                    else {
                        let input = joint_settings[`${parent_joint.joint_idx}_0`] || 0.0;

                        let joint_origin = get_xyz_rpy_SE3_matrix(parent_joint.xyz, parent_joint.rpy);
                        let joint_motion = get_joint_motion(parent_joint, input);
                        link_poses[link_idx] = mul_matrix_matrix(parent_pose, mul_matrix_matrix(joint_origin, joint_motion));
                    }
                }

                robot.set_link_mesh_pose_from_SE3_matrix(engine, link_idx, link_poses[link_idx]);
            }
        }

        if (settings.play) {
            settings.t += .01 * settings.playback_speed;
            if (settings.t > 1.0) {
                settings.t -= 1.0;
            }
        }

        let spline = evaluate_cubic_spline(settings.t, curve);
        
        // change world to local space
        let joint_origin = get_xyz_rpy_SE3_matrix(joints[0].xyz, joints[0].rpy);
        let R_origin_T = transpose(joint_origin.slice(0, 3).map(row => row.slice(0, 3)));
        let t_origin = [joint_origin[0][3], joint_origin[1][3], joint_origin[2][3]];
        let p_minus_origin = sub_matrix_matrix(spline.position, t_origin);

        let tangent_local = mul_matrix_matrix(R_origin_T, [[spline.tangent[0]], [spline.tangent[1]], [spline.tangent[2]]]);
        let rpy_local = tangent_to_rpy(tangent_local);
        rpy_local[2] -= Math.PI / 2.0;
        let xyz_local = mul_matrix_matrix(R_origin_T, [[p_minus_origin[0]], [p_minus_origin[1]], [p_minus_origin[2]]]);

        // [r, p, y, x, y, z]
        joint_settings[`${joints[0].joint_idx}_0`] = rpy_local[0];
        joint_settings[`${joints[0].joint_idx}_1`] = rpy_local[1];
        joint_settings[`${joints[0].joint_idx}_2`] = rpy_local[2];
        joint_settings[`${joints[0].joint_idx}_3`] = xyz_local[0];
        joint_settings[`${joints[0].joint_idx}_4`] = xyz_local[1];
        joint_settings[`${joints[0].joint_idx}_5`] = xyz_local[2];

        joint_settings[`${joints[1].joint_idx}_0`] = Math.sin(flap_phase) * Math.PI / 6.0;
        joint_settings[`${joints[2].joint_idx}_0`] = Math.sin(flap_phase) * Math.PI / 6.0;

    });

</script>
</body>
</html>
